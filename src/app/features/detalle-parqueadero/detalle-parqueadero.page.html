<ion-content [fullscreen]="true" style="--background: #ffffff;">
  
  <div class="hero-header">
    <img [src]="parqueadero?.imagenUrl" class="main-image">
    <div class="overlay-buttons">
      <div class="circular-btn" (click)="volver()">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </div>
      <div class="circular-btn">
        <ion-icon name="heart-outline"></ion-icon>
      </div>
    </div>
  </div>

  <div class="main-body">
    <div class="title-row">
      <div>
        <h1 class="spot-title">{{ parqueadero?.titulo }}</h1>
        <p class="spot-address">
          <ion-icon name="location-sharp"></ion-icon> {{ parqueadero?.direccion }}
        </p>
      </div>
      <div class="rating-chip">
        <ion-icon name="star"></ion-icon>
        <span>{{ parqueadero?.calificacion }}</span>
      </div>
    </div>

    <div class="amenities-grid">
      <div class="amenity-item" *ngIf="parqueadero?.amenidades?.camara">
        <ion-icon name="videocam-outline"></ion-icon>
        <span>Cámara</span>
      </div>
      <div class="amenity-item" *ngIf="parqueadero?.amenidades?.guardia">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <span>Guardia</span>
      </div>
      <div class="amenity-item" *ngIf="parqueadero?.amenidades?.techo">
        <ion-icon name="umbrella-outline"></ion-icon>
        <span>Techado</span>
      </div>
    </div>

    <hr class="divider">

    <h3 class="section-label">Configura tu reserva</h3>
    
    <div class="selection-card">
      <div class="select-item">
        <div class="icon-circle"><ion-icon name="calendar-outline"></ion-icon></div>
        <div class="select-text">
          <label>Fecha</label>
          <span>Hoy, 28 Feb</span>
        </div>
        <ion-icon name="chevron-forward" class="arrow"></ion-icon>
      </div>

      <div class="select-item">
        <div class="icon-circle"><ion-icon name="time-outline"></ion-icon></div>
        <div class="select-text">
          <label>Duración</label>
          <span>{{ horas }} horas</span>
        </div>
        <div class="stepper">
          <button (click)="ajustarHoras(-1)">-</button>
          <span>{{ horas }}</span>
          <button (click)="ajustarHoras(1)" class="plus">+</button>
        </div>
      </div>

      <div class="select-item">
        <div class="icon-circle"><ion-icon name="car-outline"></ion-icon></div>
        <div class="select-text">
          <label>Espacio</label>
          <span>A-12 (Planta Baja)</span>
        </div>
        <span class="change-link">Cambiar</span>
      </div>
    </div>
  </div>
</ion-content>

<div class="footer-payment">
  <div class="price-summary">
    <p>Precio Total</p>
    <h2>${{ total | number:'1.2-2' }}</h2>
  </div>
  <button class="pay-btn" (click)="confirmarReserva()">
    Reservar Ahora
  </button>
</div>
